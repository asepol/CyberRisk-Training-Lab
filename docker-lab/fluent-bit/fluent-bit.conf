
[SERVICE]
    Flush        1
    Daemon       Off
    Log_Level    info

[INPUT]
    Name          forward
    Listen        0.0.0.0
    Port          24224

[OUTPUT]
    Name                es
    Match               *
    Host                10.200.0.4
    Port                9200

    Logstash_Format     On
    Logstash_Prefix     fluentbit

    Suppress_Type_Name  On
    Replace_Dots        On

    Retry_Limit         False
